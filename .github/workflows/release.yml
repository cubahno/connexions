name: Release Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'

      - name: Extract tag name
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build binary
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi
          BINARY="connexions-${{ env.TAG }}-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}"
          go build -ldflags="-s -w" -o "${BINARY}" ./cmd/server

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: connexions-${{ matrix.goos }}-${{ matrix.goarch }}
          path: connexions-*

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Extract tag name
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Create release and upload binaries
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release upload "${{ env.TAG }}" connexions-* --clobber

  update-homebrew:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Extract tag and version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "VERSION=${TAG#v}" >> $GITHUB_ENV

      - name: Compute SHA256 hashes
        run: |
          BASE_URL="https://github.com/mockzilla/connexions/releases/download/${{ env.TAG }}"
          for pair in darwin-amd64 darwin-arm64 linux-amd64 linux-arm64; do
            HASH=$(curl -sL "${BASE_URL}/connexions-${{ env.TAG }}-${pair}" | sha256sum | awk '{print $1}')
            VAR="SHA_$(echo "$pair" | tr '-' '_')"
            echo "${VAR}=${HASH}" >> $GITHUB_ENV
          done

      - name: Update and push formula to homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/mockzilla/homebrew-tap.git" tap
          cd tap

          FORMULA="Formula/connexions.rb"
          sed -i "s/version \".*\"/version \"${{ env.VERSION }}\"/" "$FORMULA"

          update_sha() {
            local url_pattern="$1"
            local new_sha="$2"
            sed -i "/${url_pattern}/{n;s/sha256 \".*\"/sha256 \"${new_sha}\"/}" "$FORMULA"
          }

          update_sha "darwin-arm64" "${{ env.SHA_darwin_arm64 }}"
          update_sha "darwin-amd64" "${{ env.SHA_darwin_amd64 }}"
          update_sha "linux-arm64"  "${{ env.SHA_linux_arm64 }}"
          update_sha "linux-amd64"  "${{ env.SHA_linux_amd64 }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FORMULA"
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "connexions ${{ env.TAG }}"
          git push
